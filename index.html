<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My App</h1>
        <button id="themeToggle">Dark</button>
    </header>

    <main>
        <div class="container">
            <h1>My Todos</h1>
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="Add a new todo...">
                <input type="date" id="todoDueDate" class="todo-due-input" aria-label="Due date (optional)">
                <select id="todoPriority" class="todo-priority-input" aria-label="Priority">
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                    <option value="low">Low</option>
                </select>
                <button id="addBtn">Add</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button id="sortByDueDate" class="sort-btn">Sort by Due Date</button>
                <button id="sortByPriority" class="sort-btn">Sort by Priority</button>
            </div>

            <div class="io-section">
                <button id="exportBtn">Export JSON</button>
                <button id="importBtn">Import JSON</button>
                <input type="file" id="importFile" accept=".json" style="display:none">
            </div>

            <ul class="todo-list" id="todoList"></ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script type="module" src="/main.js"></script>
</body>
</html>
